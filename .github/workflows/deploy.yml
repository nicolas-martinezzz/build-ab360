name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to server
        env:
          SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 2222 185.47.247.175 >> ~/.ssh/known_hosts

          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p 2222 -o StrictHostKeyChecking=no" \
            --exclude='.git' \
            --exclude='.github' \
            out/ nico@185.47.247.175:/httpdocs/

          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key -p 2222 -o StrictHostKeyChecking=no" \
            public/api/ nico@185.47.247.175:/httpdocs/api/

          ssh -i ~/.ssh/deploy_key -p 2222 -o StrictHostKeyChecking=no \
            nico@185.47.247.175 \
            "mkdir -p ~/yutopias.com/private && cp /httpdocs/_private/smtp_mailer.php ~/yutopias.com/private/smtp_mailer.php 2>/dev/null || true"
