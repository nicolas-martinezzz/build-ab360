name: PR Review

on:
  pull_request:
    branches: [staging, main]
    types: [opened, synchronize, reopened]

jobs:
  validate:
    name: Automated PR Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Color palette check
        run: npm run lint:palette

      - name: JSON BOM check
        run: npm run check:json-bom

      - name: i18n parity check
        run: npm run check:i18n-parity

      - name: Tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Check for Harness files in diff
        # Guard: fail if any Harness file was MODIFIED in the PR commits themselves.
        # Harness files live in develop and are intentionally absent in staging/main.
        # We check the commits in this PR (not the full branch diff) to avoid
        # false positives from structural branch differences.
        run: |
          # Files changed in the commits of this PR only (not base vs head tree diff)
          FILES=$(git log --name-only --pretty=format: origin/${{ github.base_ref }}..HEAD | sort -u | sed '/^$/d')
          echo "Files changed in PR commits:"
          echo "$FILES"

          # These files are allowed in develop but must never appear in feature commits
          HARNESS_FILES="agents.md history.md"
          LEAKED=0

          for f in $HARNESS_FILES; do
            if echo "$FILES" | grep -q "^$f$"; then
              echo "❌ Harness file modified in PR commits: $f"
              LEAKED=1
            fi
          done

          if echo "$FILES" | grep -q "^progress/"; then
            echo "❌ Harness file modified in PR commits: progress/"
            LEAKED=1
          fi

          if [ $LEAKED -eq 1 ]; then
            echo ""
            echo "Harness Engineering files (agents.md, history.md, progress/) must not be modified in feature PRs."
            exit 1
          fi

          echo "✅ No restricted Harness files in PR commits"
